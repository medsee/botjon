name: MEXC Scalping Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install python-telegram-bot==21.0.1 aiohttp python-dotenv
      - name: Kill old bots
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteWebhook" > /dev/null
          sleep 3
      - name: Run Bot
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
          MEXC_SECRET_KEY: ${{ secrets.MEXC_SECRET_KEY }}
          MAX_TRADE_PCT: "0.05"
          STOP_LOSS_PCT: "0.008"
          TAKE_PROFIT_PCT: "0.015"
          MAX_DAILY_LOSS_PCT: "0.05"
          MAX_OPEN_POSITIONS: "5"
          MAX_DAILY_TRADES: "100"
          SCAN_INTERVAL: "15"
          MAX_HOLD_SECONDS: "180"
